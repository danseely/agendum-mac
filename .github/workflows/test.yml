name: Test

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: macos-latest

    steps:
      - name: Check out agendum-mac
        uses: actions/checkout@v5
        with:
          path: agendum-mac

      - name: Run Python parity tests
        run: python3 -m unittest discover -s Tests
        working-directory: agendum-mac

      - name: Validate feature ledger
        run: jq empty docs/features.json
        working-directory: agendum-mac

      - name: Build Swift package
        run: swift build
        working-directory: agendum-mac

      - name: Run Swift tests with coverage
        run: swift test --enable-code-coverage
        working-directory: agendum-mac

      - name: Build app bundle smoke
        run: |
          Scripts/build_app_bundle.sh
          test -d .build/Agendum.app
          test -x .build/Agendum.app/Contents/MacOS/Agendum
          plutil -lint .build/Agendum.app/Contents/Info.plist
        working-directory: agendum-mac

      - name: Check whitespace
        run: git diff --check
        working-directory: agendum-mac

      - name: Check stale helper runtime references
        run: |
          ! rg -n "python[_]coverage|Run backend coverag[e]|Backend/agendum[_]backend|agendum[_]backend_helper" .github Scripts docs/testing.md Package.swift Sources Tests
        working-directory: agendum-mac
